<!DOCTYPE html>
<html>
<head>
  <title>Heart Tree</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .card {
      width: 850px;
      height: 520px;
      background: #fff7ef;
      border-radius: 25px;
      position: relative;
      overflow: hidden;
    }

    .text {
      position: absolute;
      left: 30px;
      top: 45px;
      width: 350px;
      font-size: 22px;
      color: #222;
      z-index: 2;
    }

    canvas {
      position: absolute;
      right: 10px;
      top: 5px;
    }

    .timer {
      position: absolute;
      left: 30px;
      bottom: 45px;
      font-size: 22px;
      color: #333;
      z-index: 2;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="text">
      <p>To the love of my life:</p>
      <p>
        If I could choose one safe place,<br>
        it would be beside you.
      </p>
    </div>

    <canvas id="treeCanvas" width="520" height="470"></canvas>

    <div class="timer">
      My love for you began...
      <br><br>
      <span id="counter"></span>
    </div>

  </div>

  <script>
    const canvas = document.getElementById("treeCanvas");
    const ctx = canvas.getContext("2d");

    const colours = [
      "#ff0066",
      "#ff2d75",
      "#ff4f8b",
      "#ff6b6b",
      "#ff8a80",
      "#ffcc00"
    ];

    const hearts = [];

    function randomColour() {
      return colours[Math.floor(Math.random() * colours.length)];
    }

    function drawHeart(x, y, size, colour, opacity, rotation) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rotation);
      ctx.globalAlpha = opacity;
      ctx.fillStyle = colour;

      ctx.beginPath();
      ctx.moveTo(0, size * 0.35);
      ctx.bezierCurveTo(-size, -size * 0.35, -size * 0.6, -size, 0, -size * 0.45);
      ctx.bezierCurveTo(size * 0.6, -size, size, -size * 0.35, 0, size * 0.35);
      ctx.fill();

      ctx.restore();
      ctx.globalAlpha = 1;
    }

    function heartShapePoint(t, scaleX, scaleY) {
      const x = 16 * Math.pow(Math.sin(t), 3);

      const y = -(
        13 * Math.cos(t)
        - 5 * Math.cos(2 * t)
        - 2 * Math.cos(3 * t)
        - Math.cos(4 * t)
      );

      return {
        x: 260 + x * scaleX,
        y: 170 + y * scaleY
      };
    }

    function createHeartTree() {
      /*
        Outline hearts
      */
      for (let i = 0; i < 430; i++) {
        const t = Math.random() * Math.PI * 2;
        const p = heartShapePoint(t, 12.2, 9.6);

        hearts.push({
          x: p.x + (Math.random() - 0.5) * 18,
          y: p.y + (Math.random() - 0.5) * 18,
          startX: 260,
          startY: 360,
          size: 6 + Math.random() * 9,
          colour: randomColour(),
          opacity: 0.75 + Math.random() * 0.25,
          delay: Math.random() * 120,
          phase: Math.random() * 100,
          sway: Math.random() * 1.5,
          rotation: -0.5 + Math.random()
        });
      }

      /*
        Inner fill hearts
      */
      for (let i = 0; i < 360; i++) {
        const t = Math.random() * Math.PI * 2;
        const r = Math.pow(Math.random(), 0.45);
        const p = heartShapePoint(t, 12.2 * r, 9.6 * r);

        hearts.push({
          x: p.x + (Math.random() - 0.5) * 10,
          y: p.y + (Math.random() - 0.5) * 10,
          startX: 260,
          startY: 360,
          size: 4 + Math.random() * 8,
          colour: randomColour(),
          opacity: 0.55 + Math.random() * 0.35,
          delay: Math.random() * 140,
          phase: Math.random() * 100,
          sway: Math.random() * 1.2,
          rotation: -0.5 + Math.random()
        });
      }
    }

    function drawBranch(startX, startY, cp1X, cp1Y, cp2X, cp2Y, endX, endY, width) {
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.bezierCurveTo(cp1X, cp1Y, cp2X, cp2Y, endX, endY);
      ctx.lineWidth = width;
      ctx.strokeStyle = "#009688";
      ctx.lineCap = "round";
      ctx.stroke();
    }

    function drawTree(progress) {
      ctx.save();
      ctx.globalAlpha = progress;

      /*
        Main thin trunk
      */
      ctx.strokeStyle = "#009688";
      ctx.lineWidth = 15;
      ctx.lineCap = "round";

      ctx.beginPath();
      ctx.moveTo(260, 430);
      ctx.bezierCurveTo(258, 390, 260, 350, 260, 310);
      ctx.stroke();

      /*
        Inner branches
      */
      drawBranch(260, 325, 230, 290, 205, 250, 175, 210, 9);
      drawBranch(260, 325, 290, 290, 315, 250, 345, 210, 9);

      drawBranch(260, 300, 235, 260, 230, 220, 220, 175, 7);
      drawBranch(260, 300, 285, 260, 295, 220, 305, 175, 7);

      drawBranch(260, 345, 230, 330, 200, 305, 165, 280, 7);
      drawBranch(260, 345, 290, 330, 320, 305, 355, 280, 7);

      ctx.restore();
    }

    let frame = 0;

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      frame++;

      const treeProgress = Math.min(1, frame / 100);
      drawTree(treeProgress);

      for (const h of hearts) {
        const progress = Math.min(1, Math.max(0, (frame - h.delay) / 100));
        const ease = 1 - Math.pow(1 - progress, 3);

        const x = h.startX + (h.x - h.startX) * ease;
        const y = h.startY + (h.y - h.startY) * ease;

        const sway = Math.sin(frame * 0.025 + h.phase) * h.sway;

        drawHeart(
          x + sway,
          y,
          h.size * ease,
          h.colour,
          h.opacity * ease,
          h.rotation
        );
      }

      requestAnimationFrame(animate);
    }

    createHeartTree();
    animate();

    const startDate = new Date("2025-05-15T00:00:00");

    function updateTimer() {
      const now = new Date();
      const diff = now - startDate;

      const seconds = Math.floor(diff / 1000) % 60;
      const minutes = Math.floor(diff / (1000 * 60)) % 60;
      const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));

      document.getElementById("counter").textContent =
        `${days} days ${hours} hours ${minutes} minutes ${seconds} seconds`;
    }

    setInterval(updateTimer, 1000);
    updateTimer();
  </script>

</body>
</html>
