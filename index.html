<!DOCTYPE html>
<html>

<head>
  <title>Heart Tree</title>

  <style>

    body {
      margin: 0;
      height: 100vh;

      background: #111;

      display: flex;
      justify-content: center;
      align-items: center;

      font-family: Arial, sans-serif;
    }

    .card {
      width: 850px;
      height: 520px;

      background: #fff7ef;

      border-radius: 25px;

      padding: 35px;

      position: relative;

      overflow: hidden;
    }

    .text {
      width: 45%;

      font-size: 22px;

      color: #222;
    }

    /*
      HEART CONTAINER
    */
    .heart {
      position: absolute;

      right: 90px;
      top: 55px;

      width: 330px;
      height: 300px;
    }

    /*
      HEART PARTICLES
    */
    .leaf {
      position: absolute;

      width: 14px;
      height: 14px;

      background: red;

      transform: rotate(45deg);

      animation: float 3s infinite ease-in-out;
    }

    /*
      TOP CIRCLES OF HEART SHAPE
    */
    .leaf::before,
    .leaf::after {

      content: "";

      position: absolute;

      width: 100%;
      height: 100%;

      background: inherit;

      border-radius: 50%;
    }

    .leaf::before {
      left: -50%;
    }

    .leaf::after {
      top: -50%;
    }

    /*
      TREE STRUCTURE
    */
    .tree {
      position: absolute;

      right: 220px;
      top: 285px;

      width: 120px;
      height: 190px;
    }

    /*
      MAIN TRUNK
    */
    .trunk {
      position: absolute;

      left: 42px;
      top: 45px;

      width: 38px;
      height: 130px;

      background: linear-gradient(
        to right,
        #5b3218,
        #8b5a2b,
        #4a2612
      );

      border-radius: 45% 45% 20% 20%;

      transform: rotate(2deg);
    }

    /*
      BRANCHES
    */
    .branch {
      position: absolute;

      width: 20px;
      height: 90px;

      background: linear-gradient(
        to right,
        #5b3218,
        #8b5a2b,
        #4a2612
      );

      border-radius: 50%;

      transform-origin: bottom center;
    }

    .branch-left {
      left: 28px;
      top: 20px;

      transform: rotate(-35deg);
    }

    .branch-right {
      left: 70px;
      top: 20px;

      transform: rotate(35deg);
    }

    /*
      TIMER
    */
    .timer {
      position: absolute;

      bottom: 55px;
      left: 35px;

      font-size: 24px;

      color: #333;
    }

    /*
      FLOATING ANIMATION
    */
    @keyframes float {

      0%, 100% {
        transform: translateY(0px) rotate(45deg);
      }

      50% {
        transform: translateY(-8px) rotate(45deg);
      }
    }

  </style>
</head>

<body>

  <div class="card">

    <!-- TEXT -->
    <div class="text">

      <p>To the love of my life:</p>

      <p>
        If I could choose one safe place,<br>
        it would be beside you.
      </p>

    </div>

    <!-- HEART -->
    <div class="heart" id="heart"></div>

    <!-- TREE -->
    <div class="tree">

      <div class="branch branch-left"></div>

      <div class="branch branch-right"></div>

      <div class="trunk"></div>

    </div>

    <!-- TIMER -->
    <div class="timer">

      My love for you began...

      <br><br>

      <span id="counter"></span>

    </div>

  </div>

  <script>

    /*
      GET HEART CONTAINER
    */
    const heart =
      document.getElementById("heart");

    /*
      CREATE HEART PARTICLES
    */
    for (let i = 0; i < 320; i++) {

      const leaf =
        document.createElement("div");

      leaf.className = "leaf";

      /*
        RANDOM ANGLE
      */
      const t =
        Math.random() * Math.PI * 2;

      /*
        DISTRIBUTION CONTROL
      */
      const r =
        Math.pow(Math.random(), 0.45);

      /*
        HEART EQUATION
      */
      const x =
        16 * Math.pow(Math.sin(t), 3);

      const y = -(
        13 * Math.cos(t)
        - 5 * Math.cos(2 * t)
        - 2 * Math.cos(3 * t)
        - Math.cos(4 * t)
      );

      /*
        POSITIONING
      */
      leaf.style.left =
        155 + x * 7 * r + "px";

      leaf.style.top =
        135 + y * 7 * r + "px";

      /*
        RANDOM COLOURS
      */
      const colours = [
        "#ff2d75",
        "#ff0066",
        "#ffcc00",
        "#ff6b6b",
        "#ff1493"
      ];

      leaf.style.background =
        colours[
          Math.floor(
            Math.random() * colours.length
          )
        ];

      /*
        RANDOM MOVEMENT TIMING
      */
      leaf.style.animationDelay =
        Math.random() * 3 + "s";

      /*
        RANDOM SIZE
      */
      const size =
        10 + Math.random() * 10;

      leaf.style.width =
        size + "px";

      leaf.style.height =
        size + "px";

      /*
        ADD TO PAGE
      */
      heart.appendChild(leaf);
    }

    /*
      TIMER START DATE
    */
    const startDate =
      new Date("2025-05-15T00:00:00");

    /*
      UPDATE TIMER
    */
    function updateTimer() {

      const now = new Date();

      const diff =
        now - startDate;

      const seconds =
        Math.floor(diff / 1000) % 60;

      const minutes =
        Math.floor(diff / (1000 * 60)) % 60;

      const hours =
        Math.floor(diff / (1000 * 60 * 60)) % 24;

      const days =
        Math.floor(diff / (1000 * 60 * 60 * 24));

      document.getElementById("counter").textContent =

        `${days} days ${hours} hours ${minutes} minutes ${seconds} seconds`;
    }

    /*
      UPDATE EVERY SECOND
    */
    setInterval(updateTimer, 1000);

    /*
      RUN IMMEDIATELY
    */
    updateTimer();

  </script>

</body>

</html>
