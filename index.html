<script>

  const heart = document.getElementById("heart");

  for (let i = 0; i < 320; i++) {

    const leaf = document.createElement("div");

    leaf.className = "leaf";

    const t = Math.random() * Math.PI * 2;

    /*
      Higher value gives a denser centre
      and smoother outer edge.
    */
    const r = Math.pow(Math.random(), 0.72);

    const x =
      16 * Math.pow(Math.sin(t), 3);

    const y = -(
      13 * Math.cos(t)
      - 5 * Math.cos(2 * t)
      - 2 * Math.cos(3 * t)
      - Math.cos(4 * t)
    );

    /*
      x * 8.5 makes the heart wider.
      y * 6.2 makes the heart less tall.
      145 moves the shape lower.
    */
    leaf.style.left =
      140 + x * 8.5 * r + "px";

    leaf.style.top =
      145 + y * 6.2 * r + "px";

    const colours = [
      "#ff2d75",
      "#ff0066",
      "#ffcc00",
      "#ff6b6b",
      "#ff1493"
    ];

    leaf.style.background =
      colours[
        Math.floor(Math.random() * colours.length)
      ];

    leaf.style.animationDelay =
      Math.random() * 3 + "s";

    const size =
      10 + Math.random() * 10;

    leaf.style.width = size + "px";
    leaf.style.height = size + "px";

    /*
      Slight opacity variation creates fake depth.
    */
    leaf.style.opacity =
      0.7 + Math.random() * 0.3;

    heart.appendChild(leaf);
  }

  const startDate =
    new Date("2025-05-15T00:00:00");

  function updateTimer() {

    const now = new Date();

    const diff = now - startDate;

    const seconds =
      Math.floor(diff / 1000) % 60;

    const minutes =
      Math.floor(diff / (1000 * 60)) % 60;

    const hours =
      Math.floor(diff / (1000 * 60 * 60)) % 24;

    const days =
      Math.floor(diff / (1000 * 60 * 60 * 24));

    document.getElementById("counter").textContent =
      `${days} días ${hours} horas ${minutes} minutos ${seconds} segundos`;
  }

  setInterval(updateTimer, 1000);

  updateTimer();

</script>
