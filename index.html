<!DOCTYPE html>
<html>

<head>
  <title>Heart Tree</title>

  <style>

    /* PAGE */
    body {
      margin: 0;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      background: #111;

      font-family: Arial, sans-serif;
    }

    /* MAIN CARD */
    .card {
      width: 850px;
      height: 520px;

      background: #fff7ef;

      border-radius: 25px;

      padding: 35px;

      position: relative;

      overflow: hidden;
    }

    /* LEFT TEXT */
    .text {
      width: 45%;

      font-size: 18px;

      color: #333;
    }

    /* HEART AREA */
    .heart {
      position: absolute;

      right: 70px;
      top: 40px;

      width: 400px;
      height: 350px;
    }

    /* INDIVIDUAL HEART */
    .leaf {
      position: absolute;

      background: red;

      transform: rotate(45deg);

      animation: float 3s infinite ease-in-out;

      filter: drop-shadow(0 0 3px rgba(0,0,0,0.15));
    }

    /* HEART CIRCLES */
    .leaf::before,
    .leaf::after {
      content: "";

      position: absolute;

      width: 100%;
      height: 100%;

      background: inherit;

      border-radius: 50%;
    }

    .leaf::before {
      left: -50%;
    }

    .leaf::after {
      top: -50%;
    }

    /* TREE TRUNK */
    .trunk {
      position: absolute;

      right: 235px;
      top: 310px;

      width: 35px;
      height: 120px;

      background: teal;
    }

    /* TIMER */
    .timer {
      position: absolute;

      bottom: 45px;
      left: 35px;

      font-size: 20px;

      color: #333;
    }

    /* FLOATING ANIMATION */
    @keyframes float {

      0%, 100% {
        transform: translateY(0px) rotate(45deg);
      }

      50% {
        transform: translateY(-8px) rotate(45deg);
      }
    }

  </style>
</head>

<body>

  <div class="card">

    <div class="text">
      <p>Para el amor de mi vida:</p>

      <p>
        Si pudiera elegir un lugar seguro,<br>
        sería a tu lado.
      </p>
    </div>

    <!-- HEART CONTAINER -->
    <div class="heart" id="heart"></div>

    <!-- TREE TRUNK -->
    <div class="trunk"></div>

    <!-- TIMER -->
    <div class="timer">
      Mi amor por ti comenzó hace...
      <br><br>
      <span id="counter"></span>
    </div>

  </div>

  <script>

    /*
      ====================================================
      HEART TREE GENERATOR
      ====================================================
    */

    const heart = document.getElementById("heart");

    /*
      Create 320 heart particles
    */
    for (let i = 0; i < 320; i++) {

      const leaf = document.createElement("div");

      leaf.className = "leaf";

      /*
        Random angle around circle
      */
      const t = Math.random() * Math.PI * 2;

      /*
        Distribution control
      */
      const r = Math.pow(Math.random(), 0.72);

      /*
        Heart equations
      */
      const x =
        16 * Math.pow(Math.sin(t), 3);

      const y = -(
        13 * Math.cos(t)
        - 5 * Math.cos(2 * t)
        - 2 * Math.cos(3 * t)
        - Math.cos(4 * t)
      );

      /*
        Positioning
      */
      leaf.style.left =
        170 + x * 8.5 * r + "px";

      leaf.style.top =
        145 + y * 6.2 * r + "px";

      /*
        Random colours
      */
      const colours = [
        "#ff2d75",
        "#ff0066",
        "#ffcc00",
        "#ff6b6b",
        "#ff1493"
      ];

      leaf.style.background =
        colours[
          Math.floor(Math.random() * colours.length)
        ];

      /*
        Random movement timing
      */
      leaf.style.animationDelay =
        Math.random() * 3 + "s";

      /*
        Random sizes
      */
      const size =
        10 + Math.random() * 10;

      leaf.style.width = size + "px";
      leaf.style.height = size + "px";

      /*
        Slight transparency
      */
      leaf.style.opacity =
        0.7 + Math.random() * 0.3;

      /*
        Add to page
      */
      heart.appendChild(leaf);
    }

    /*
      ====================================================
      TIMER
      ====================================================
    */

    const startDate =
      new Date("2025-05-15T00:00:00");

    function updateTimer() {

      const now = new Date();

      const diff = now - startDate;

      const seconds =
        Math.floor(diff / 1000) % 60;

      const minutes =
        Math.floor(diff / (1000 * 60)) % 60;

      const hours =
        Math.floor(diff / (1000 * 60 * 60)) % 24;

      const days =
        Math.floor(diff / (1000 * 60 * 60 * 24));

      document.getElementById("counter").textContent =
        `${days} días ${hours} horas ${minutes} minutos ${seconds} segundos`;
    }

    setInterval(updateTimer, 1000);

    updateTimer();

  </script>

</body>
</html>
