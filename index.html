<!DOCTYPE html>
<html>
<head>
  <title>Heart Tree</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .card {
      width: 850px;
      height: 520px;
      background: #fff7ef;
      border-radius: 25px;
      padding: 35px;
      position: relative;
      overflow: hidden;
    }

    .text {
      width: 45%;
      font-size: 22px;
      color: #222;
    }

    .heart {
      position: absolute;
      right: 90px;
      top: 55px;
      width: 330px;
      height: 300px;
    }

    .leaf {
      position: absolute;
      width: 14px;
      height: 14px;
      background: red;
      transform: rotate(45deg);
      animation: float 3s infinite ease-in-out;
    }

    .leaf::before,
    .leaf::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: inherit;
      border-radius: 50%;
    }

    .leaf::before {
      left: -50%;
    }

    .leaf::after {
      top: -50%;
    }

    .trunk {
      position: absolute;
      right: 250px;
      top: 330px;
      width: 42px;
      height: 130px;
      background: teal;
    }

    .timer {
      position: absolute;
      bottom: 55px;
      left: 35px;
      font-size: 24px;
      color: #333;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) rotate(45deg);
      }

      50% {
        transform: translateY(-8px) rotate(45deg);
      }
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="text">
      <p>Para el amor de mi vida:</p>

      <p>
        Si pudiera elegir un lugar seguro,<br>
        sería a tu lado.
      </p>
    </div>

    <div class="heart" id="heart"></div>

    <div class="trunk"></div>

    <div class="timer">
      Mi amor por ti comenzó hace...
      <br><br>
      <span id="counter"></span>
    </div>

  </div>

  <script>
    const heart = document.getElementById("heart");

    for (let i = 0; i < 320; i++) {
      const leaf = document.createElement("div");

      leaf.className = "leaf";

      const t = Math.random() * Math.PI * 2;

      const r = Math.pow(Math.random(), 0.45);

      const x =
        16 * Math.pow(Math.sin(t), 3);

      const y = -(
        13 * Math.cos(t)
        - 5 * Math.cos(2 * t)
        - 2 * Math.cos(3 * t)
        - Math.cos(4 * t)
      );

      leaf.style.left =
        155 + x * 7 * r + "px";

      leaf.style.top =
        135 + y * 7 * r + "px";

      const colours = [
        "#ff2d75",
        "#ff0066",
        "#ffcc00",
        "#ff6b6b",
        "#ff1493"
      ];

      leaf.style.background =
        colours[
          Math.floor(Math.random() * colours.length)
        ];

      leaf.style.animationDelay =
        Math.random() * 3 + "s";

      const size =
        10 + Math.random() * 10;

      leaf.style.width = size + "px";
      leaf.style.height = size + "px";

      heart.appendChild(leaf);
    }

    const startDate =
      new Date("2025-05-15T00:00:00");

    function updateTimer() {
      const now = new Date();

      const diff = now - startDate;

      const seconds =
        Math.floor(diff / 1000) % 60;

      const minutes =
        Math.floor(diff / (1000 * 60)) % 60;

      const hours =
        Math.floor(diff / (1000 * 60 * 60)) % 24;

      const days =
        Math.floor(diff / (1000 * 60 * 60 * 24));

      document.getElementById("counter").textContent =
        `${days} días ${hours} horas ${minutes} minutos ${seconds} segundos`;
    }

    setInterval(updateTimer, 1000);

    updateTimer();
  </script>

</body>
</html>
