<!DOCTYPE html>
<html>
<head>
  <title>Heart Tree</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .card {
      width: 850px;
      height: 520px;
      background: #fff7ef;
      border-radius: 25px;
      padding: 35px;
      position: relative;
      overflow: hidden;
    }

    .text {
      width: 40%;
      font-size: 18px;
      color: #222;
    }

    .heart {
      position: absolute;
      right: 75px;
      top: 35px;
      width: 420px;
      height: 360px;
    }

    .leaf {
      position: absolute;
      width: var(--size);
      height: var(--size);
      background: red;
      transform: rotate(45deg);
      animation: float 3s infinite ease-in-out;
    }

    .leaf::before,
    .leaf::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: inherit;
      border-radius: 50%;
    }

    .leaf::before {
      left: -50%;
    }

    .leaf::after {
      top: -50%;
    }

    .tree {
      position: absolute;
      right: 230px;
      top: 235px;
      width: 130px;
      height: 230px;
    }

    .trunk {
      position: absolute;
      left: 48px;
      top: 80px;
      width: 38px;
      height: 145px;
      background: linear-gradient(to right, #007f78, #009688, #006b64);
      clip-path: polygon(35% 0%, 65% 0%, 85% 100%, 15% 100%);
    }

    .branch {
      position: absolute;
      width: 12px;
      height: 100px;
      background: #008b80;
      border-radius: 50%;
      transform-origin: bottom center;
    }

    .branch-left-one {
      left: 38px;
      top: 40px;
      transform: rotate(-45deg);
    }

    .branch-left-two {
      left: 45px;
      top: 20px;
      transform: rotate(-25deg);
    }

    .branch-right-one {
      left: 78px;
      top: 40px;
      transform: rotate(45deg);
    }

    .branch-right-two {
      left: 72px;
      top: 20px;
      transform: rotate(25deg);
    }

    .timer {
      position: absolute;
      bottom: 50px;
      left: 35px;
      font-size: 18px;
      color: #333;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px) rotate(45deg);
      }

      50% {
        transform: translateY(-6px) rotate(45deg);
      }
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="text">
      <p>To the love of my life:</p>

      <p>
        If I could choose one safe place,<br>
        it would be beside you.
      </p>
    </div>

    <div class="heart" id="heart"></div>

    <div class="tree">
      <div class="branch branch-left-one"></div>
      <div class="branch branch-left-two"></div>
      <div class="branch branch-right-one"></div>
      <div class="branch branch-right-two"></div>
      <div class="trunk"></div>
    </div>

    <div class="timer">
      My love for you began...
      <br><br>
      <span id="counter"></span>
    </div>

  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {

      const heart = document.getElementById("heart");

      const colours = [
        "#ff2d75",
        "#ff0066",
        "#ffcc00",
        "#ff6b6b",
        "#ff1493",
        "#ff8a80",
        "#ffd54f"
      ];

      for (let i = 0; i < 520; i++) {

        const leaf = document.createElement("div");
        leaf.className = "leaf";

        const t = Math.random() * Math.PI * 2;

        const r = Math.pow(Math.random(), 0.62);

        const x =
          16 * Math.pow(Math.sin(t), 3);

        const y = -(
          13 * Math.cos(t)
          - 5 * Math.cos(2 * t)
          - 2 * Math.cos(3 * t)
          - Math.cos(4 * t)
        );

        leaf.style.left =
          205 + x * 11 * r + "px";

        leaf.style.top =
          165 + y * 9 * r + "px";

        leaf.style.background =
          colours[Math.floor(Math.random() * colours.length)];

        const size =
          6 + Math.random() * 10;

        leaf.style.setProperty("--size", size + "px");

        leaf.style.animationDelay =
          Math.random() * 3 + "s";

        leaf.style.opacity =
          0.75 + Math.random() * 0.25;

        heart.appendChild(leaf);
      }

      const startDate =
        new Date("2025-05-15T00:00:00");

      function updateTimer() {
        const now = new Date();
        const diff = now - startDate;

        const seconds = Math.floor(diff / 1000) % 60;
        const minutes = Math.floor(diff / (1000 * 60)) % 60;
        const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));

        document.getElementById("counter").textContent =
          `${days} days ${hours} hours ${minutes} minutes ${seconds} seconds`;
      }

      setInterval(updateTimer, 1000);
      updateTimer();

    });
  </script>

</body>
</html>
