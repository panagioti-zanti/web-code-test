<script>

  /*
    ============================================================
    HEART TREE GENERATOR
    ============================================================

    This section creates all the floating heart leaves.
  */

  /*
    Gets the HTML element with id="heart"

    We store it inside a variable so we can
    add leaves into it later.
  */
  const heart = document.getElementById("heart");


  /*
    LOOP
    ------------------------------------------------------------

    Creates many heart leaves automatically.

    let i = 0
      -> starting value

    i < 320
      -> keep looping until 320 leaves exist

    i++
      -> add 1 every loop
  */
  for (let i = 0; i < 320; i++) {

    /*
      Creates a new HTML div element

      Equivalent to:

      <div></div>
    */
    const leaf = document.createElement("div");


    /*
      Adds:

      class="leaf"

      This allows CSS styling to apply.
    */
    leaf.className = "leaf";


    /*
      RANDOM ANGLE
      ------------------------------------------------------------

      Math.random()
        gives a random number between 0 and 1

      Math.PI
        is the mathematical constant π

      * 2
        gives a full circle in radians
    */
    const t = Math.random() * Math.PI * 2;


    /*
      RANDOM DISTRIBUTION
      ------------------------------------------------------------

      This controls HOW leaves spread through the heart.

      Normal random distribution creates messy spacing.

      Using Math.pow changes the probability curve.

      Lower exponent values:
      -> create denser clustering

      This creates a smoother heart shape.
    */
    const r = Math.pow(Math.random(), 0.45);


    /*
      ============================================================
      HEART EQUATION
      ============================================================

      These equations generate x/y coordinates
      forming a mathematical heart shape.

      Commonly used in:
      - graphics
      - animations
      - particle systems
      - generative art
    */

    const x =
      16 * Math.pow(Math.sin(t), 3);

    const y = -(
      13 * Math.cos(t)
      - 5 * Math.cos(2 * t)
      - 2 * Math.cos(3 * t)
      - Math.cos(4 * t)
    );


    /*
      ============================================================
      POSITIONING
      ============================================================

      We convert the heart equation coordinates
      into actual screen positions.

      + "px"
        converts numbers into CSS pixels
    */

    leaf.style.left =
      140 + x * 7 * r + "px";

    leaf.style.top =
      130 + y * 7 * r + "px";


    /*
      ============================================================
      COLOUR SYSTEM
      ============================================================

      Array containing possible colours.

      Arrays store multiple values.
    */
    const colours = [
      "#ff2d75",
      "#ff0066",
      "#ffcc00",
      "#ff6b6b",
      "#ff1493"
    ];


    /*
      RANDOM COLOUR PICKER
      ------------------------------------------------------------

      Math.floor removes decimals.

      This randomly selects a colour
      from the array.
    */
    leaf.style.background =
      colours[
        Math.floor(Math.random() * colours.length)
      ];


    /*
      RANDOM ANIMATION DELAY
      ------------------------------------------------------------

      Without this:
      every leaf moves together.

      With random delays:
      movement looks more natural.
    */
    leaf.style.animationDelay =
      Math.random() * 3 + "s";


    /*
      RANDOM SIZE VARIATION
      ------------------------------------------------------------

      Creates slightly different leaf sizes
      so the tree feels more organic.
    */
    const size =
      10 + Math.random() * 10;

    leaf.style.width = size + "px";
    leaf.style.height = size + "px";


    /*
      ============================================================
      ADD LEAF TO PAGE
      ============================================================

      appendChild places the new leaf
      inside the heart container.
    */
    heart.appendChild(leaf);
  }


  /*
    ============================================================
    TIMER SYSTEM
    ============================================================
  */

  /*
    Starting date/time

    Change this to whatever date you want.
  */
  const startDate =
    new Date("2025-05-15T00:00:00");


  /*
    FUNCTION
    ------------------------------------------------------------

    Functions are reusable blocks of code.
  */
  function updateTimer() {

    /*
      Current date/time
    */
    const now = new Date();


    /*
      Difference between dates

      Result is in milliseconds.
    */
    const diff = now - startDate;


    /*
      ============================================================
      TIME CONVERSIONS
      ============================================================

      Converts milliseconds into:
      - seconds
      - minutes
      - hours
      - days
    */

    const seconds =
      Math.floor(diff / 1000) % 60;

    const minutes =
      Math.floor(diff / (1000 * 60)) % 60;

    const hours =
      Math.floor(diff / (1000 * 60 * 60)) % 24;

    const days =
      Math.floor(diff / (1000 * 60 * 60 * 24));


    /*
      ============================================================
      UPDATE HTML TEXT
      ============================================================

      textContent changes text inside HTML.
    */
    document.getElementById("counter").textContent =

      `${days} días ${hours} horas ${minutes} minutos ${seconds} segundos`;
  }


  /*
    ============================================================
    RUN TIMER EVERY SECOND
    ============================================================

    1000 milliseconds = 1 second
  */
  setInterval(updateTimer, 1000);


  /*
    Runs immediately once so user does not wait
    1 second for the first update.
  */
  updateTimer();

</script>
