<!DOCTYPE html>
<html>
<head>
  <title>Heart Tree</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .card {
      width: 850px;
      height: 520px;
      background: #fff7ef;
      border-radius: 25px;
      position: relative;
      overflow: hidden;
    }

    canvas {
      position: absolute;
      inset: 0;
      cursor: pointer;
      z-index: 3;
    }

    .text {
      position: absolute;
      left: 35px;
      top: 45px;
      width: 350px;
      font-size: 22px;
      color: #222;
      opacity: 0;
      transition: opacity 1.5s ease;
      pointer-events: none;
      z-index: 2;
    }

    .timer {
      position: absolute;
      left: 35px;
      bottom: 45px;
      font-size: 22px;
      color: #333;
      opacity: 0;
      transition: opacity 1.5s ease;
      pointer-events: none;
      z-index: 2;
    }

    .show {
      opacity: 1;
    }
  </style>
</head>

<body>

<div class="card">
  <div class="text" id="messageText">
    <p>To the love of my life:</p>
    <p>
      If I could choose one safe place,<br>
      it would be beside you.
    </p>
  </div>

  <div class="timer" id="timerBox">
    My love for you began...
    <br><br>
    <span id="counter"></span>
  </div>

  <canvas id="canvas" width="850" height="520"></canvas>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const textBox = document.getElementById("messageText");
const timerBox = document.getElementById("timerBox");

const colours = [
  "#ff0066",
  "#ff2d75",
  "#ff4f8b",
  "#ff6b6b",
  "#ff8a80",
  "#ffcc00",
  "#ffd54f"
];

let clicked = false;
let frame = 0;

const startHeart = {
  x: 425,
  y: 170,
  size: 27
};

const impactX = 425;
const groundY = 390;

let ballY = startHeart.y;
let ballX = impactX;
let ballVisible = true;

let treeX = impactX;
const treeTargetX = 610;

const leaves = [];
const fallingLeaves = [];

function randomColour() {
  return colours[Math.floor(Math.random() * colours.length)];
}

function easeOutCubic(t) {
  return 1 - Math.pow(1 - t, 3);
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function drawHeart(x, y, size, colour, opacity = 1, rotation = 0) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation);
  ctx.globalAlpha = opacity;
  ctx.fillStyle = colour;

  ctx.beginPath();
  ctx.moveTo(0, size * 0.35);

  ctx.bezierCurveTo(
    -size,
    -size * 0.35,
    -size * 0.6,
    -size,
    0,
    -size * 0.45
  );

  ctx.bezierCurveTo(
    size * 0.6,
    -size,
    size,
    -size * 0.35,
    0,
    size * 0.35
  );

  ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawStartScreen() {
  drawHeart(startHeart.x, startHeart.y, startHeart.size, "#ff2d75");

  ctx.strokeStyle = "#333";
  ctx.lineWidth = 2;
  ctx.lineCap = "round";

  ctx.beginPath();
  ctx.moveTo(startHeart.x, startHeart.y + 35);
  ctx.lineTo(startHeart.x, startHeart.y + 95);
  ctx.stroke();

  ctx.fillStyle = "#333";
  ctx.font = "22px Arial";
  ctx.textAlign = "center";
  ctx.fillText("click here", startHeart.x, startHeart.y + 130);
}

function drawGround(progress) {
  const width = 620 * easeOutCubic(progress);

  ctx.strokeStyle = "#333";
  ctx.lineWidth = 3;
  ctx.lineCap = "round";

  ctx.beginPath();
  ctx.moveTo(impactX - width / 2, groundY);
  ctx.lineTo(impactX + width / 2, groundY);
  ctx.stroke();
}

function drawBall(progress) {
  if (!ballVisible) return;

  const p = easeOutCubic(progress);
  ballY = startHeart.y + (groundY - startHeart.y - 11) * p;

  if (progress >= 1) {
    ballVisible = false;
    return;
  }

  ctx.fillStyle = "#ff2d75";
  ctx.beginPath();
  ctx.arc(ballX, ballY, 13, 0, Math.PI * 2);
  ctx.fill();
}

function cubicBezier(points, t) {
  const x =
    Math.pow(1 - t, 3) * points[0].x +
    3 * Math.pow(1 - t, 2) * t * points[1].x +
    3 * (1 - t) * Math.pow(t, 2) * points[2].x +
    Math.pow(t, 3) * points[3].x;

  const y =
    Math.pow(1 - t, 3) * points[0].y +
    3 * Math.pow(1 - t, 2) * t * points[1].y +
    3 * (1 - t) * Math.pow(t, 2) * points[2].y +
    Math.pow(t, 3) * points[3].y;

  return { x, y };
}

function drawTaperedBranch(points, progress, startWidth, endWidth, colour = "#00a58f") {
  const grow = easeOutCubic(progress);
  const steps = 42;

  ctx.strokeStyle = colour;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  for (let i = 0; i < steps * grow; i++) {
    const t1 = i / steps;
    const t2 = (i + 1) / steps;

    const a = cubicBezier(points, t1);
    const b = cubicBezier(points, t2);

    ctx.lineWidth = startWidth + (endWidth - startWidth) * t1;

    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  }
}

function drawTree(progress) {
  const p = easeOutCubic(progress);
  const green = "#00a58f";

  ctx.save();

  ctx.beginPath();
  ctx.rect(0, 0, canvas.width, groundY - 1);
  ctx.clip();

  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  const treeBaseY = groundY - 10;

  const trunk = [
    { x: treeX - 2, y: treeBaseY },
    { x: treeX - 8, y: groundY - 65 },
    { x: treeX + 2, y: groundY - 135 },
    { x: treeX + 1, y: groundY - 215 }
  ];

  drawTaperedBranch(trunk, p, 22, 2.4, green);

  if (progress > 0.18) {
    const bp = clamp((progress - 0.18) / 0.82, 0, 1);

    const branches = [
      {
        // lower left branch
        points: [
          { x: treeX - 2, y: groundY - 82 },
          { x: treeX - 30, y: groundY - 105 },
          { x: treeX - 75, y: groundY - 132 },
          { x: treeX - 110, y: groundY - 152 }
        ],
        sw: 7.5,
        ew: 0.25
      },
      {
        // lower right branch
        points: [
          { x: treeX + 1, y: groundY - 96 },
          { x: treeX + 28, y: groundY - 118 },
          { x: treeX + 68, y: groundY - 142 },
          { x: treeX + 118, y: groundY - 160 }
        ],
        sw: 7,
        ew: 0.25
      },
      {
        // upper left branch
        points: [
          { x: treeX + 0, y: groundY - 132 },
          { x: treeX - 16, y: groundY - 155 },
          { x: treeX - 42, y: groundY - 180 },
          { x: treeX - 72, y: groundY - 208 }
        ],
        sw: 5.5,
        ew: 0.2
      },
      {
        // upper right branch
        points: [
          { x: treeX + 1, y: groundY - 150 },
          { x: treeX + 18, y: groundY - 170 },
          { x: treeX + 42, y: groundY - 190 },
          { x: treeX + 72, y: groundY - 214 }
        ],
        sw: 5,
        ew: 0.2
      }
    ];

    for (const b of branches) {
      drawTaperedBranch(b.points, bp, b.sw, b.ew, green);
    }

    const twigs = [
      {
        // left lower twig, from branch tip
        points: [
          { x: treeX - 100, y: groundY - 150 },
          { x: treeX - 112, y: groundY - 150 },
          { x: treeX - 132, y: groundY - 162 },
          { x: treeX - 150, y: groundY - 180 }
        ],
        sw: 1.8
      },
      {
        // left lower outer twig
        points: [
          { x: treeX - 102, y: groundY - 143 },
          { x: treeX - 122, y: groundY - 142 },
          { x: treeX - 145, y: groundY - 145 },
          { x: treeX - 165, y: groundY - 154 }
        ],
        sw: 1.3
      },
      {
        // left upper twig
        points: [
          { x: treeX - 48, y: groundY - 184 },
          { x: treeX - 62, y: groundY - 202 },
          { x: treeX - 74, y: groundY - 220 },
          { x: treeX - 85, y: groundY - 240 }
        ],
        sw: 1.3
      },
      {
        // right upper twig
        points: [
          { x: treeX + 46, y: groundY - 194 },
          { x: treeX + 62, y: groundY - 208 },
          { x: treeX + 78, y: groundY - 222 },
          { x: treeX + 94, y: groundY - 238 }
        ],
        sw: 1.3
      },
      {
        // right lower twig
        points: [
          { x: treeX + 82, y: groundY - 148 },
          { x: treeX + 105, y: groundY - 154 },
          { x: treeX + 128, y: groundY - 164 },
          { x: treeX + 150, y: groundY - 178 }
        ],
        sw: 1.3
      },
      {
        // right lower outer twig
        points: [
          { x: treeX + 92, y: groundY - 152 },
          { x: treeX + 112, y: groundY - 145 },
          { x: treeX + 132, y: groundY - 138 },
          { x: treeX + 155, y: groundY - 128 }
        ],
        sw: 1.2
      },
      {
        // small top-right split
        points: [
          { x: treeX + 1, y: groundY - 186 },
          { x: treeX + 10, y: groundY - 202 },
          { x: treeX + 20, y: groundY - 218 },
          { x: treeX + 30, y: groundY - 236 }
        ],
        sw: 1.8
      }
    ];

    ctx.globalAlpha = 0.45;

    for (const t of twigs) {
      drawTaperedBranch(t.points, bp, t.sw, 0.05, green);
    }

    ctx.globalAlpha = 1;
  }

  ctx.restore();
}
function createLeaves() {
  leaves.length = 0;
  fallingLeaves.length = 0;

  const canopyOffsetX = 0;
  const canopyOffsetY = -180;

  const canopyCentreX = treeX + canopyOffsetX;
  const canopyCentreY = groundY + canopyOffsetY;

  const leafSpacing = 9;

  for (let y = -150; y <= 120; y += leafSpacing) {
    for (let x = -190; x <= 190; x += leafSpacing) {
      const jitterX = (Math.random() - 0.5) * 8;
      const jitterY = (Math.random() - 0.5) * 8;

      const px = x + jitterX;
      const py = y + jitterY;

      const normalX = px / 150;
      const normalY = -py / 125;

      const heartValue =
        Math.pow(normalX * normalX + normalY * normalY - 1, 3)
        - normalX * normalX * Math.pow(normalY, 3);

      if (heartValue <= 0) {
        if (Math.random() < 0.08) continue;

        leaves.push({
          relX: canopyOffsetX + px,
          finalY: canopyCentreY + py,
          startRelX: canopyOffsetX,
          startY: canopyCentreY,
          size: 4 + Math.random() * 8,
          colour: randomColour(),
          opacity: 0.55 + Math.random() * 0.4,
          delay: Math.random() * 140,
          phase: Math.random() * 100,
          sway: Math.random() * 1.3,
          rotation: -0.5 + Math.random(),
          depth: 0.7 + Math.random() * 0.6
        });
      }
    }
  }

  for (let i = 0; i < 60; i++) {
    fallingLeaves.push({
      relX: -160 + Math.random() * 230,
      y: groundY - 300 + Math.random() * 150,
      size: 3 + Math.random() * 5,
      colour: randomColour(),
      speedX: -0.45 - Math.random() * 0.55,
      speedY: 0.25 + Math.random() * 0.55,
      phase: Math.random() * 100,
      opacity: 0.35 + Math.random() * 0.35,
      rotation: -0.5 + Math.random()
    });
  }
}

function drawLeaves(progress) {
  for (const leaf of leaves) {
    const local = clamp(
      (progress * 190 - leaf.delay) / 45,
      0,
      1
    );

    const e = easeOutCubic(local);

    const x = treeX + leaf.relX;
    const y = leaf.finalY;

    const sway =
      Math.sin(frame * 0.025 + leaf.phase) * leaf.sway;

    drawHeart(
      x + sway,
      y,
      leaf.size * e * leaf.depth,
      leaf.colour,
      leaf.opacity * e,
      leaf.rotation
    );
  }
}

function drawFallingLeaves(active) {
  if (!active) return;

  for (const leaf of fallingLeaves) {
    leaf.relX += leaf.speedX;
    leaf.y += leaf.speedY;

    if (leaf.y > groundY + 30 || treeX + leaf.relX < 270) {
      leaf.relX = -160 + Math.random() * 230;
      leaf.y = groundY - 300 + Math.random() * 150;
    }

    drawHeart(
      treeX +
      leaf.relX +
      Math.sin(frame * 0.03 + leaf.phase) * 7,
      leaf.y,
      leaf.size,
      leaf.colour,
      leaf.opacity,
      leaf.rotation +
      Math.sin(frame * 0.02 + leaf.phase) * 0.7
    );
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!clicked) {
    drawStartScreen();
    requestAnimationFrame(animate);
    return;
  }

  frame++;

  const groundProgress = clamp(frame / 80, 0, 1);
  const ballProgress = clamp(frame / 95, 0, 1);

  drawGround(groundProgress);
  drawBall(ballProgress);

  if (frame > 95) {
    const treeProgress =
      clamp((frame - 95) / 150, 0, 1);

    const moveProgress =
      clamp((frame - 430) / 130, 0, 1);

    treeX =
      impactX +
      (treeTargetX - impactX) *
      easeOutCubic(moveProgress);

    drawTree(treeProgress);

    if (treeProgress >= 1 && leaves.length === 0) {
      createLeaves();
    }

    if (treeProgress >= 1) {
      const leafProgress =
        clamp((frame - 245) / 180, 0, 1);

      drawLeaves(leafProgress);
      drawFallingLeaves(frame > 570);
    }

    if (moveProgress > 0.35) {
      textBox.classList.add("show");
      timerBox.classList.add("show");
    }
  }

  requestAnimationFrame(animate);
}

canvas.addEventListener("click", function () {
  if (!clicked) {
    clicked = true;
    frame = 0;
    ballVisible = true;
  }
});

animate();

const startDate =
  new Date("2025-05-15T00:00:00");

function updateTimer() {
  const now = new Date();
  const diff = now - startDate;

  const seconds = Math.floor(diff / 1000) % 60;
  const minutes = Math.floor(diff / (1000 * 60)) % 60;
  const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));

  document.getElementById("counter").textContent =
    `${days} days ${hours} hours ${minutes} minutes ${seconds} seconds`;
}

setInterval(updateTimer, 1000);
updateTimer();
</script>

</body>
</html>
