<!DOCTYPE html>
<html>
<head>
  <title>Heart Tree</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .card {
      width: 850px;
      height: 520px;
      background: #fff7ef;
      border-radius: 25px;
      position: relative;
      overflow: hidden;
    }

    .text {
      position: absolute;
      left: 35px;
      top: 40px;
      width: 330px;
      font-size: 18px;
      color: #222;
      z-index: 2;
    }

    canvas {
      position: absolute;
      right: 20px;
      top: 10px;
    }

    .timer {
      position: absolute;
      left: 35px;
      bottom: 45px;
      font-size: 18px;
      color: #333;
      z-index: 2;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="text">
      <p>To the love of my life:</p>

      <p>
        If I could choose one safe place,<br>
        it would be beside you.
      </p>
    </div>

    <canvas id="treeCanvas" width="500" height="450"></canvas>

    <div class="timer">
      My love for you began...
      <br><br>
      <span id="counter"></span>
    </div>

  </div>

  <script>
    const canvas = document.getElementById("treeCanvas");
    const ctx = canvas.getContext("2d");

    const colours = [
      "#ff2d75",
      "#ff0066",
      "#ffcc00",
      "#ff6b6b",
      "#ff1493",
      "#ff8a80"
    ];

    const hearts = [];

    function heartPoint(t, scale) {
      const x = 16 * Math.pow(Math.sin(t), 3);

      const y = -(
        13 * Math.cos(t)
        - 5 * Math.cos(2 * t)
        - 2 * Math.cos(3 * t)
        - Math.cos(4 * t)
      );

      return {
        x: 250 + x * scale,
        y: 145 + y * scale
      };
    }

    function drawHeart(x, y, size, colour, opacity) {
      ctx.save();

      ctx.translate(x, y);
      ctx.rotate(Math.PI / 4);

      ctx.globalAlpha = opacity;
      ctx.fillStyle = colour;

      ctx.fillRect(-size / 2, -size / 2, size, size);

      ctx.beginPath();
      ctx.arc(-size / 2, 0, size / 2, 0, Math.PI * 2);
      ctx.arc(0, -size / 2, size / 2, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();

      ctx.globalAlpha = 1;
    }

    function createHearts() {
      for (let i = 0; i < 900; i++) {
        const t = Math.random() * Math.PI * 2;
        const r = Math.pow(Math.random(), 0.55);

        const p = heartPoint(t, 10 * r);

        hearts.push({
          x: p.x,
          y: p.y,
          size: 4 + Math.random() * 7,
          colour: colours[Math.floor(Math.random() * colours.length)],
          speed: 0.4 + Math.random() * 0.8,
          offset: Math.random() * 100,
          opacity: 0.65 + Math.random() * 0.35
        });
      }
    }

    function drawTree() {
      ctx.save();

      ctx.strokeStyle = "#008b80";
      ctx.lineCap = "round";

      ctx.lineWidth = 14;

      ctx.beginPath();
      ctx.moveTo(250, 390);
      ctx.bezierCurveTo(245, 330, 250, 275, 250, 230);
      ctx.stroke();

      ctx.lineWidth = 8;

      ctx.beginPath();
      ctx.moveTo(250, 270);
      ctx.bezierCurveTo(210, 235, 190, 200, 160, 165);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(250, 270);
      ctx.bezierCurveTo(290, 235, 315, 200, 345, 165);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(250, 235);
      ctx.bezierCurveTo(225, 210, 215, 180, 205, 145);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(250, 235);
      ctx.bezierCurveTo(275, 210, 285, 180, 300, 145);
      ctx.stroke();

      ctx.restore();
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawTree();

      const time = Date.now() * 0.002;

      for (const h of hearts) {
        const sway = Math.sin(time + h.offset) * h.speed;
        const float = Math.cos(time * 0.8 + h.offset) * h.speed;

        drawHeart(
          h.x + sway,
          h.y + float,
          h.size,
          h.colour,
          h.opacity
        );
      }

      requestAnimationFrame(animate);
    }

    createHearts();
    animate();

    const startDate = new Date("2025-05-15T00:00:00");

    function updateTimer() {
      const now = new Date();
      const diff = now - startDate;

      const seconds = Math.floor(diff / 1000) % 60;
      const minutes = Math.floor(diff / (1000 * 60)) % 60;
      const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));

      document.getElementById("counter").textContent =
        `${days} days ${hours} hours ${minutes} minutes ${seconds} seconds`;
    }

    setInterval(updateTimer, 1000);
    updateTimer();
  </script>

</body>
</html>
